version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-data:/app/data
    ports:
      - "3100:3100"

  bot:
    build: .
    restart: unless-stopped
    command: node bot.js
    env_file: .env
    volumes:
      - app-data:/app/data

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  app-data:
  certbot-etc:
  certbot-var:
